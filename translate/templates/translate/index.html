<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Translator</title>
        <style>
            :root {
                --primary: #4f46e5;
            }
            body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #1f2937;
        }
        .container {
            max-width: 680px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        header {
            background: var(--primary);
            color: white;
            padding: 25px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.2rem; }
        .subtitle { opacity: 0.9; margin-top: 8px; }
        
        .content { padding: 30px; }
        label {
            display: block;
            margin: 15px 0 8px;
            font-weight: 600;
            color: #374151;
        }
        textarea, select, button {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1.05rem;
        }
        textarea {
            min-height: 140px;
            resize: vertical;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            padding: 16px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        button:hover {
            background: #4338ca;
            transform: translateY(-3px);
        }
        .result-box {
            margin-top: 25px;
            padding: 18px;
            background: #f8fafc;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            min-height: 80px;
        }
        .loading { color: #6b7280; font-style: italic; }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>English - Swahili Translator</h1>
                <p class="subtitle">Simple Fast Accurate for common phrases</p>
            </header>

            <div class="content">
                <label>Enter text to translate:</label>
                <textarea id="inputText" placeholder="Example: buy maize or nunua mahindi"></textarea>
                <label>Translate to:</label>

                <select id="targetLanguage">
                    <option value="sw">Swahili (from English)</option>
                    <option value="en">English (from Swahili)</option>
                </select>

                <button onclick="translateNow()">Translate Now</button>

                <div class="result-box">
                    <strong>Translated Text:</strong><br>
                    <span id="translatedText">Your result will appear here...</span>
                </div>
            </div>
        </div>

        <script>
            async function translateNow() {
                const text = document.getElementById('inputText').value.trim();
                const lang = document.getElementById('targetLanguage').value;
                const resultEl = document.getElementById('translatedText');

                if (!text) {
                    resultEl.textContent = "Please enter some text";
                    return;
                }

                resultEl.textContent = "Translating..."

                try {
                    const res = await fetch('/api/v1/translate-text', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: text,
                            targetLanguage: lang
                        })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        resultEl.textContent = data.translatedText || "No translation available";
                    } else {
                        resultEl.textContent = `Error: ${data.error || 'Something went wrong'}`;
                    }
                } catch (err) {
                    resultEl.textContent = "Could not connect to server";
                }
            }

            document.getElementById('InputText').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    translateNow();
                }
            });
        </script>
    </body>
</html>
